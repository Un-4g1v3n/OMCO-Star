name: AWS Incremental Telemetry Pull

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  aws_incremental_pull:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas boto3 requests

      - name: Pull AWS telemetry
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          SITE_GROUP: A
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ONEDRIVE_USER_EMAIL: ${{ secrets.ONEDRIVE_USER_EMAIL }}
        run: python aws_incremental_pull.py

      - name: Commit updated AWS state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add aws_site_state.json

          git diff --cached --quiet || git commit -m "Update AWS telemetry state"

          git pull --rebase origin main

          git push
